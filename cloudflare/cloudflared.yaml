namespace: cloudflare

# Base runnable for cloudflared tunnel agent
cloudflared:
  defines: runnable
  permitted-secrets:
    cloudflare-tunnel-token: true
  variables:
    token_secret_ref:
      type: string
      value: cloudflare-tunnel-token
      description: Secret name that stores the tunnel token
    CLOUDFLARED_TOKEN:
      type: string
      env: CLOUDFLARED_TOKEN
      value: <- secret($token_secret_ref)
    command_options:
      type: string
      value: --no-autoupdate
      description: Options after "tunnel" (before "run"), e.g., --config
    subcommand_options:
      type: string
      value: ""
      description: Options after "run" (e.g., --cred-file)
  containers:
    cloudflared:
      image: cloudflare/cloudflared:latest
      restart: always
      cmd: <- `tunnel ${command_options} run ${subcommand_options} --token ${CLOUDFLARED_TOKEN}`
