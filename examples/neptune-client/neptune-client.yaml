namespace: neptune-client

# AWS production stack (us-east-1) for the neptune-client Node.js/TypeScript worker.
# - Provisions an AWS Neptune cluster + instance
# - Opens inbound access to Neptune (8182/tcp) only from the worker's AWS node security groups
# - Runs the worker container image `neptune-client:latest` (no HTTP exposure)

neptune-cluster:
  defines: aws-neptune/cluster
  region: us-east-1
  db_cluster_identifier: neptune-client-prod
  port: 8182
  auto_create_security_group: true
  security_group_name: neptune-client-prod-sg
  storage_encrypted: true
  backup_retention_period: 1
  deletion_protection: true
  # With deletion protection enabled, deletion should be blocked; we also skip the final snapshot
  # to avoid needing a unique snapshot identifier on delete attempts.
  skip_final_snapshot: true
  tags:
    environment: prod
    application: neptune-client
    managed-by: monk
  services:
    data:
      protocol: custom

neptune-instance:
  defines: aws-neptune/instance
  region: us-east-1
  db_instance_identifier: neptune-client-prod-1
  db_instance_class: db.t3.medium
  db_cluster_identifier: <- connection-target("cluster") entity-state get-member("db_cluster_identifier")
  tags:
    environment: prod
    application: neptune-client
    managed-by: monk
  connections:
    cluster:
      target: neptune-client/neptune-cluster
      service: data
  depends:
    wait-for:
      runnables:
        - neptune-client/neptune-cluster
      timeout: 900
  services:
    data:
      protocol: custom

neptune-client:
  defines: runnable
  containers:
    main:
      image: neptune-client:latest
      # Uses the image default CMD (e.g., npm start). Override here if needed:
      # command: ["npm", "start"]
  connections:
    neptune:
      target: neptune-client/neptune-cluster
      service: data
    neptune-instance:
      target: neptune-client/neptune-instance
      service: data
  depends:
    wait-for:
      runnables:
        - neptune-client/neptune-instance
      timeout: 1200
  variables:
    neptune-host:
      type: string
      value: <- connection-target("neptune") entity-state get-member("endpoint")
      env: NEPTUNE_HOST
    neptune-port:
      type: int
      value: 8182
      env: NEPTUNE_PORT
    neptune-use-ssl:
      type: bool
      value: true
      env: NEPTUNE_USE_SSL
    neptune-timeout:
      type: int
      value: 30000
      env: NEPTUNE_TIMEOUT
    operation-interval-ms:
      type: int
      value: 10000
      env: OPERATION_INTERVAL_MS

neptune-client-prod:
  defines: runnable
  inherits: neptune-client/neptune-client
  scale:
    value: 1

neptune-access-list:
  defines: aws-neptune/neptune-access-list
  region: us-east-1
  port: 8182
  vpc_id: <- connection-target("db") entity-state get-member("vpc_id")
  security_group_id: <- connection-target("db") entity-state get-member("created_security_group_id")
  # Allow inbound Neptune traffic from the AWS node security groups running this runnable.
  # NOTE: This field is a YAML array of strings. Since the runnable is scaled to 1 in prod,
  # we take a single peer security group name from runnable-peers().
  allowed_security_group_names:
    - <- runnable-peers("neptune-client/neptune-client-prod") last
  connections:
    db:
      target: neptune-client/neptune-cluster
      service: data
    instance:
      target: neptune-client/neptune-instance
      service: data
  depends:
    wait-for:
      runnables:
        # MUST wait for both cluster and client so runnable-peers() returns non-empty.
        - neptune-client/neptune-cluster
        - neptune-client/neptune-instance
        - neptune-client/neptune-client-prod
      timeout: 1200

prod:
  defines: group
  members:
    - neptune-client/neptune-cluster
    - neptune-client/neptune-instance
    - neptune-client/neptune-client-prod
    - neptune-client/neptune-access-list
