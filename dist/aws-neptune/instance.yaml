namespace: aws-neptune
instance:
  defines: entity
  metadata:
    name: Instance
    description: |-
      AWS Neptune Instance entity.
      Creates and manages Amazon Neptune database instances within a cluster.
      Instances provide the compute capacity for graph queries.

      ## Secrets
      - Reads: none (authenticated via AWS provider)
      - Writes: none

      ## State Fields for Composition
      - `state.db_instance_arn` - Instance ARN for IAM policies
      - `state.db_instance_identifier` - Instance identifier
      - `state.endpoint_address` - Instance endpoint for direct connections
      - `state.endpoint_port` - Connection port
      - `state.is_cluster_writer` - Whether this is the primary writer

      ## Composing with Other Entities
      Works with:
      - `aws-neptune/cluster` - Parent cluster for this instance
      - `aws-neptune/parameter-group` - Instance parameter configuration
      - `aws-iam/role` - Grant instance access to other services
    version-hash: 5b09e3d50f6e
  schema:
    region:
      type: string
      description: AWS region for the Neptune resource
    db_instance_identifier:
      type: string
      description: 'Unique identifier for the Neptune instance (1-63 chars, starts with letter)'
    db_cluster_identifier:
      type: string
      description: Cluster identifier this instance belongs to
    db_instance_class:
      anyOf:
        - type: string
          enum:
            - db.r5.large
            - db.r5.xlarge
            - db.r5.2xlarge
            - db.r5.4xlarge
            - db.r5.8xlarge
            - db.r5.12xlarge
            - db.r5.16xlarge
            - db.r5.24xlarge
            - db.r6g.large
            - db.r6g.xlarge
            - db.r6g.2xlarge
            - db.r6g.4xlarge
            - db.r6g.8xlarge
            - db.r6g.12xlarge
            - db.r6g.16xlarge
            - db.t3.medium
            - db.t4g.medium
            - db.serverless
        - type: string
      description: 'Instance class (e.g., db.r5.large, db.serverless)'
    engine_version:
      type: string
      description: Neptune engine version
    availability_zone:
      type: string
      description: Availability zone for the instance
    db_parameter_group_name:
      type: string
      description: DB parameter group name
    preferred_maintenance_window:
      type: string
      description: 'Preferred maintenance window (UTC, ddd:hh24:mi-ddd:hh24:mi)'
    auto_minor_version_upgrade:
      type: boolean
      description: Enable automatic minor version upgrades
    promotion_tier:
      type: number
      description: 'Promotion tier for failover (0-15, lower = higher priority)'
    enable_performance_insights:
      type: boolean
      description: Enable Performance Insights
    performance_insights_retention_period:
      type: number
      description: Performance Insights retention period (7 or 731 days)
    tags:
      type: object
      additionalProperties:
        type: string
        description: Resource tags for the instance
      description: Resource tags for the instance
    required:
      - region
      - db_instance_identifier
      - db_cluster_identifier
      - db_instance_class
  state-schema:
    existing:
      type: boolean
      description: Indicates if the resource pre-existed before this entity managed it
    db_instance_arn:
      type: string
      description: Full ARN of the instance
    db_instance_identifier:
      type: string
      description: Instance identifier
    db_cluster_identifier:
      type: string
      description: Cluster identifier
    status:
      type: string
      enum:
        - available
        - backing-up
        - creating
        - deleting
        - failed
        - maintenance
        - modifying
        - rebooting
        - renaming
        - resetting-master-credentials
        - starting
        - stopped
        - stopping
        - storage-optimization
        - upgrading
      description: Current status of the instance
    endpoint_address:
      type: string
      description: Instance endpoint address
    endpoint_port:
      type: number
      description: Instance endpoint port
    db_instance_class:
      type: string
      description: Instance class
    engine_version:
      type: string
      description: Engine version
    availability_zone:
      type: string
      description: Availability zone
    instance_create_time:
      type: string
      description: Instance creation timestamp
    dbi_resource_id:
      type: string
      description: Resource ID
    is_cluster_writer:
      type: boolean
      description: Whether this is the primary writer instance
  lifecycle:
    sync: <<< instance-sync.js
    get-info: ''
    reboot: ''
    promote: ''
    get-logs: ''
    get-cost-estimate: ''
    costs: ''
  checks:
    readiness:
      period: 10
      initialDelay: 60
      attempts: 90
    liveness:
      period: 300
  requires:
    - aws-neptune/neptune-base
    - cli
    - cloud/aws
    - aws-neptune/common
