namespace: aws-rds
rds-instance:
  defines: entity
  metadata:
    name: RDSInstance
    description: "AWS RDS Instance entity.\nCreates and manages Amazon RDS database instances for relational databases.\nSupports MySQL, PostgreSQL, MariaDB, Oracle, and SQL Server engines.\n\n## Secrets\n- Reads: none (authenticated via AWS provider)\n- Writes: secret name from `password_secret_ref` property - Master password (defaults to `{db_instance_identifier}-master-password`)\n\n## State Fields for Composition\n- `state.db_instance_identifier` - Instance identifier\n- `state.endpoint_address` - Database connection hostname\n- `state.endpoint_port` - Database connection port\n- `state.db_instance_arn` - Instance ARN for IAM policies\n- `state.created_security_group_id` - ID of auto-created security group (for use with rds-access-list)\n\n## Composing with Other Entities\nWorks with:\n- `aws-rds/rds-access-list` - Manage security group rules dynamically at runtime (recommended)\n\nAlternative (manual configuration via definition properties):\n- `vpc_security_group_ids` - Attach existing security groups directly\n- `db_subnet_group_name` - Place database in specific VPC subnets\n\n---\n## RDS Access Patterns\n\n⚠️ **DO NOT** use hardcoded `allowed_cidr_blocks` on this entity:\n```yaml\n# ❌ WRONG - opens access to entire VPC, not just client nodes\ndatabase:\n  allowed_cidr_blocks: [\"172.31.0.0/16\"]  # DO NOT DO THIS\n```\n\n✅ **ALWAYS** use `aws-rds/rds-access-list` for dynamic access control.\nChoose pattern based on where client runs:\n\n### Pattern 1: Private Access (client on AWS nodes, same VPC)\n```yaml\ndatabase:\n  defines: aws-rds/rds-instance\n  publicly_accessible: false           # No public endpoint\n  auto_create_security_group: true     # Creates empty SG\n\naccess-list:\n  defines: aws-rds/rds-access-list\n  security_group_id: <- connection-target(\"db\") entity-state get-member(\"created_security_group_id\")\n  port: <- connection-target(\"db\") entity-state get-member(\"endpoint_port\")\n  allowed_security_group_names: <- runnable-peers(\"ns/client\")  # SG-to-SG access\n  depends:\n    wait-for:\n      runnables: [ns/database, ns/client]\n```\n\n### Pattern 2: Public Access (client on other cloud/region)\n```yaml\ndatabase:\n  defines: aws-rds/rds-instance\n  publicly_accessible: true            # Public endpoint required\n  auto_create_security_group: true\n\naccess-list:\n  defines: aws-rds/rds-access-list\n  security_group_id: <- connection-target(\"db\") entity-state get-member(\"created_security_group_id\")\n  port: <- connection-target(\"db\") entity-state get-member(\"endpoint_port\")\n  allowed_cidr_blocks: <- runnable-peers-public-ips(\"ns/client\")  # Public IP access\n  depends:\n    wait-for:\n      runnables: [ns/database, ns/client]\n```\n\n### Deployment Order (CRITICAL)\n1. **RDS Instance** → creates DB + empty security group\n2. **Client** → deploys to nodes (gets assigned security groups)\n3. **Access List** → reads client's node SGs/IPs, opens access\n\naccess-list MUST depend on both database AND client.\nIf deployed before client: `runnable-peers()` returns empty → no access → connection fails.\n\n\U0001F4D6 **Full playbook:** See PLAYBOOK.md in this directory for complete examples.\n---"
    version-hash: e50a32312a63
  schema:
    region:
      type: string
      description: AWS region for the RDS instance
    db_instance_identifier:
      type: string
      description: 'DB instance identifier (1-63 chars, starts with letter)'
    db_instance_class:
      type: string
      description: 'Instance class (e.g., db.t3.micro)'
    engine:
      type: string
      description: 'Database engine (e.g., mysql, postgres)'
    master_username:
      type: string
      description: Master username for the database
    allocated_storage:
      type: number
      description: Allocated storage in GB
    engine_version:
      type: string
      description: Specific engine version
    port:
      type: number
      description: Database port
    db_name:
      type: string
      description: Secret reference to store/retrieve the master password
    password_secret_ref:
      type: string
    vpc_security_group_ids:
      type: array
      items:
        type: string
      description: VPC security group IDs to associate
    db_subnet_group_name:
      type: string
      description: DB subnet group name
    backup_retention_period:
      type: number
      description: Backup retention period (days)
    preferred_backup_window:
      type: string
      description: 'Preferred backup window (UTC, hh24:mi-hh24:mi)'
    preferred_maintenance_window:
      type: string
      description: 'Preferred maintenance window (UTC, ddd:hh24:mi-ddd:hh24:mi)'
    auto_minor_version_upgrade:
      type: boolean
      description: Enable automatic minor version upgrades
    multi_az:
      type: boolean
      description: Multi-AZ deployment
    publicly_accessible:
      type: boolean
      description: Public accessibility
    storage_type:
      type: string
      description: 'Storage type (e.g., gp2, gp3, io1)'
    storage_encrypted:
      type: boolean
      description: Enable storage encryption
    kms_key_id:
      type: string
      description: KMS key ID for encryption
    deletion_protection:
      type: boolean
      description: Enable deletion protection
    skip_final_snapshot:
      type: boolean
      description: Skip final snapshot on delete
    final_db_snapshot_identifier:
      type: string
      description: Final snapshot identifier when not skipping
    tags:
      type: object
      additionalProperties:
        type: string
        description: Resource tags for the instance
      description: Resource tags for the instance
    auto_create_security_group:
      type: boolean
      description: Auto-create a security group and manage ingress rules
    security_group_name:
      type: string
      description: Name for the auto-created security group
    security_group_description:
      type: string
      description: Description for the auto-created security group
    vpc_id:
      type: string
      description: VPC ID to use when creating or resolving security groups
    allowed_cidr_blocks:
      type: array
      items:
        type: string
      description: Allowed CIDR blocks for ingress on the DB port
    allowed_security_group_names:
      type: array
      items:
        type: string
      description: 'Allowed security group names for ingress on the DB port, include default Monk VPC CIR 172.31.0.0/16'
    required:
      - region
      - db_instance_identifier
      - db_instance_class
      - engine
      - master_username
      - allocated_storage
  state-schema:
    existing:
      type: boolean
      description: Indicates if the instance pre-existed before this entity managed it
    db_instance_identifier:
      type: string
      description: DB instance identifier
    db_instance_arn:
      type: string
      description: DB instance ARN
    db_instance_status:
      type: string
      description: 'Current DB instance status (e.g., available)'
    endpoint_address:
      type: string
      description: Endpoint address
    endpoint_port:
      type: number
      description: Endpoint port
    allocated_storage:
      type: number
      description: Allocated storage in GB
    creation_time:
      type: string
      description: Instance creation timestamp
    last_modified:
      type: string
      description: Last modified timestamp
    created_security_group_id:
      type: string
      description: ID of the auto-created security group (if any)
    created_security_group_existing:
      type: boolean
      description: Whether the used security group pre-existed
    required:
      - existing
  lifecycle:
    sync: <<< rds-instance-sync.js
    get-instance-info: ''
    update-password: ''
    get-backup-info: ''
    create-snapshot: ''
    list-snapshots: ''
    describe-snapshot: ''
    delete-snapshot: ''
    restore: ''
    get-restore-status: ''
    get-connection-info: ''
  checks:
    readiness:
      period: 10
      initialDelay: 10
      attempts: 100
    liveness:
      period: 300
  requires:
    - aws-rds/rds-base
    - monkec/base
    - cli
    - secret
    - aws-rds/common
